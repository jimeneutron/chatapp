<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:system-ui;
background:#313338;
color:#e3e3e3;
height:100vh;
display:flex;
}

#login{
margin:auto;
display:flex;
flex-direction:column;
gap:10px;
width:250px;
}

input,button{
padding:8px;
border-radius:6px;
border:none;
}

button{
background:#5865F2;
color:white;
cursor:pointer;
}

#app{
display:none;
width:100%;
height:100%;
}

#sidebar{
width:230px;
background:#2b2d31;
display:flex;
flex-direction:column;
}

#rooms{
flex:1;
overflow:auto;
}

.room{
padding:10px;
cursor:pointer;
}

.room:hover{
background:#404249;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:15px;
}

.message{
display:flex;
gap:10px;
margin-bottom:15px;
}

.pfp{
width:36px;
height:36px;
border-radius:50%;
}

.msgcontent{
background:#383a40;
padding:8px;
border-radius:6px;
max-width:500px;
}

.chatimg{
max-width:250px;
margin-top:5px;
border-radius:5px;
}

.mention{
color:#00a8ff;
font-weight:bold;
}

#inputbar{
background:#2b2d31;
padding:10px;
display:flex;
gap:6px;
}

#inputbar input[type=text]{
flex:1;
background:#1e1f22;
color:white;
}

#mentionBox{
position:absolute;
background:#1e1f22;
border:1px solid #444;
display:none;
max-height:150px;
overflow:auto;
}

.mentionUser{
padding:6px;
cursor:pointer;
}

.mentionUser:hover{
background:#444;
}

</style>
</head>

<body>

<div id="login">

<h2>Chat Login</h2>

<input id="username" placeholder="username">
<input id="password" type="password" placeholder="password">

<button onclick="login()">Login / Register</button>

</div>

<div id="app">

<div id="sidebar">

<button onclick="createRoom()">+ Room</button>

<div id="rooms"></div>

</div>

<div id="chat">

<div id="messages"></div>

<div id="inputbar">

<input id="textInput" placeholder="message">

<input type="file" id="imageInput">

<button onclick="send()">Send</button>

</div>

<div id="mentionBox"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
collection,
addDoc,
query,
where,
onSnapshot,
updateDoc,
arrayUnion,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";





// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAU1SHuBd24zNgP11D6aOPV3w0YFxz8bso",
  authDomain: "cchhatteerr.firebaseapp.com",
  projectId: "cchhatteerr",
  storageBucket: "cchhatteerr.firebasestorage.app",
  messagingSenderId: "462333840338",
  appId: "1:462333840338:web:81b2a196992783a7ea160b",
  measurementId: "G-H9M070PFZB"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);

};

const app = initializeApp(firebaseConfig);
const auth = getAuth();
const db = getFirestore();

let uid=""
let username=""
let pfp=""
let currentRoom="global"
let usersCache=[]

async function login(){

let u=document.getElementById("username").value
let p=password.value

let email=u+"@chat.local"

try{

await signInWithEmailAndPassword(auth,email,p)

}catch{

await createUserWithEmailAndPassword(auth,email,p)

}

}

onAuthStateChanged(auth,async user=>{

if(!user) return

uid=user.uid
username=user.email.split("@")[0]

let ref=doc(db,"users",uid)
let snap=await getDoc(ref)

if(!snap.exists()){

await setDoc(ref,{
username:username,
pfp:"",
created:Date.now()
})

}

pfp=(await getDoc(ref)).data().pfp

login.style.display="none"
app.style.display="flex"

loadUsers()
loadRooms()
listenMessages()

})

async function loadUsers(){

const snap=await getDocs(collection(db,"users"))

usersCache=[]

snap.forEach(d=>{

usersCache.push(d.data().username)

})

}

function loadRooms(){

const roomsDiv=document.getElementById("rooms")

roomsDiv.innerHTML=""

let global=document.createElement("div")

global.className="room"

global.innerText="# global"

global.onclick=()=>{

currentRoom="global"
listenMessages()

}

roomsDiv.appendChild(global)

const q=query(collection(db,"rooms"),where("members","array-contains",uid))

onSnapshot(q,snap=>{

snap.forEach(d=>{

let r=document.createElement("div")

r.className="room"

r.innerText="# "+d.data().name

r.onclick=()=>{

currentRoom=d.id
listenMessages()

}

roomsDiv.appendChild(r)

})

})

}

function listenMessages(){

messages.innerHTML=""

const q=query(collection(db,"messages"),where("roomId","==",currentRoom))

onSnapshot(q,snap=>{

messages.innerHTML=""

snap.forEach(docu=>{

let m=docu.data()

let div=document.createElement("div")
div.className="message"

let mentionFormatted=(m.text||"").replace(/@(\w+)/g,'<span class="mention">@$1</span>')

div.innerHTML=`
<img class="pfp" src="${m.pfp||''}">
<div class="msgcontent">
<b>${m.sender}</b><br>
${mentionFormatted}
</div>
`

if(m.image){

let img=document.createElement("img")

img.src=m.image
img.className="chatimg"

div.querySelector(".msgcontent").appendChild(img)

}

messages.appendChild(div)

})

messages.scrollTop=messages.scrollHeight

})

}

async function send(){

let text=textInput.value
let file=imageInput.files[0]

let image=null

if(file){

image=await compress(file)

}

await addDoc(collection(db,"messages"),{

roomId:currentRoom,
sender:username,
senderUID:uid,
text:text,
image:image,
pfp:pfp,
timestamp:Date.now()

})

textInput.value=""
imageInput.value=""

}

function compress(file){

return new Promise(resolve=>{

let reader=new FileReader()

reader.onload=e=>{

let img=new Image()

img.onload=()=>{

let canvas=document.createElement("canvas")

let max=600

let scale=Math.min(max/img.width,max/img.height)

canvas.width=img.width*scale
canvas.height=img.height*scale

let ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0,canvas.width,canvas.height)

resolve(canvas.toDataURL("image/jpeg",0.7))

}

img.src=e.target.result

}

reader.readAsDataURL(file)

})

}

async function createRoom(){

let name=prompt("Room name")

if(!name) return

let room=await addDoc(collection(db,"rooms"),{

name:name,
members:[uid],
created:Date.now()

})

let add=prompt("Add username")

if(add){

const q=query(collection(db,"users"),where("username","==",add))

let snap=await getDocs(q)

snap.forEach(async d=>{

await updateDoc(doc(db,"rooms",room.id),{
members:arrayUnion(d.id)
})

})

}

}

textInput.addEventListener("input",()=>{

let value=textInput.value

if(!value.includes("@")){

mentionBox.style.display="none"
return

}

let part=value.split("@").pop().toLowerCase()

let matches=usersCache.filter(u=>u.startsWith(part)).slice(0,5)

mentionBox.innerHTML=""

matches.forEach(u=>{

let div=document.createElement("div")

div.className="mentionUser"

div.innerText=u

div.onclick=()=>{

textInput.value=value.replace(/@\w*$/,"@"+u+" ")

mentionBox.style.display="none"

}

mentionBox.appendChild(div)

})

if(matches.length){

mentionBox.style.display="block"

}else{

mentionBox.style.display="none"

}

})

</script>

</body>
</html>
